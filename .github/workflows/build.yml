name: build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - run: pnpm lint
        working-directory: packages/flatline-solid

      - run: pnpm check
        working-directory: packages/flatline-solid

      - run: pnpm test
        working-directory: packages/flatline-solid

      - run: pnpm build
        working-directory: packages/flatline-solid
