name: pull request

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - run: pnpm lint
        working-directory: packages/flatline-solid

      - run: pnpm check
        working-directory: packages/flatline-solid

      - run: pnpm test
        working-directory: packages/flatline-solid

      - run: pnpm build
        working-directory: packages/flatline-solid

